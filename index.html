<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <!-- Primary Meta -->
    <title>Builder House — Premium Websites for Ambitious Businesses</title>
    <meta name="description" content="Builder House designs and builds premium, conversion-ready websites for small and growing businesses in India. Fixed pricing, fast delivery, honest process." />
    <meta name="author" content="Builder House" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#00A877" />
    <link rel="canonical" href="https://builderhouse.co.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Builder House" />
    <meta property="og:url" content="https://builderhouse.co.in/" />
    <meta property="og:title" content="Builder House — Premium Websites for Ambitious Businesses" />
    <meta property="og:description" content="Builder House designs and builds premium, conversion-ready websites for small and growing businesses in India. Fixed pricing, fast delivery, honest process." />
    <meta property="og:image" content="https://builderhouse.co.in/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Builder House — Premium Websites for Ambitious Businesses" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Builder House — Premium Websites for Ambitious Businesses" />
    <meta name="twitter:description" content="Premium websites and digital systems for ambitious Indian businesses — built with craft, not templates." />
    <meta name="twitter:image" content="https://builderhouse.co.in/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Builder House",
      "url": "https://builderhouse.co.in",
      "logo": "https://builderhouse.co.in/favicon.svg",
      "description": "Premium website design and development studio for small and growing businesses in India.",
      "email": "builderhouse.work@gmail.com",
      "telephone": "+918602475603",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi"],
        "telephone": "+918602475603"
      }
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Builder House",
      "url": "https://builderhouse.co.in"
    }
    </script>

    <!-- Fonts: preconnect first, then load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
